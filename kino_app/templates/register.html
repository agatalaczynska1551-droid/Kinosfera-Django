{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 20px; background: #1a1a1a; color: white; border-radius: 8px; border: 1px solid #333;">
    <h2 style="color: #ff9800;">Zarejestruj się w Kinosferze</h2>
    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #ff9800; color: black; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px;">
            Stwórz konto
        </button>
    </form>
    <p style="margin-top: 15px;">Masz już konto? <a href="{% url 'login' %}" style="color: #ff9800;">Zaloguj się</a></p>
</div>
{% endblock %}
